<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default "en" }}">
  <head>
    {{ partial "theme-init.html" . }}
    {{ partial "head.html" . }}
    {{ block "head_extras" . }}{{ end }}
  </head>
  <body>
    <div class="site">
      {{ partial "header.html" . }}
      <main>
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
    {{ partial "search.html" . }}
    {{ partial "scripts.html" . }}
  </body>
</html>
