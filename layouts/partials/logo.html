{{/* Logo: image if site.Params.logo is set, otherwise the blog title as text. */ -}}
{{- $blogTitle := site.Params.blogTitle | default site.Title -}}
<a class="site-logo" href="{{ site.Home.RelPermalink }}" aria-label="{{ i18n "site_home" $blogTitle }}">
  {{ with site.Params.logo }}
    <img src="{{ . | relURL }}" alt="{{ $blogTitle }}">
  {{ else }}
    <span>{{ $blogTitle }}</span>
  {{ end }}
</a>
