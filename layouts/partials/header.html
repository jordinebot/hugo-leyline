<header class="site-header">
  <div class="container site-header__inner">
    {{ partial "logo.html" . }}

    <nav class="site-nav" aria-label="{{ i18n "nav_primary" }}" data-mobile-open="false">
      {{ if site.Menus.main }}
        <ul class="site-nav__list" id="site-nav-list">
          {{ range site.Menus.main }}
            {{ $isCurrent := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
            <li>
              <a class="site-nav__link" href="{{ .URL | relURL }}"{{ if $isCurrent }} aria-current="page"{{ end }}>
                {{ .Name }}
              </a>
            </li>
          {{ end }}
        </ul>
      {{ end }}

      <div class="site-nav__controls">
        {{ partial "language-switcher.html" . }}

        <button class="icon-btn" type="button" aria-label="{{ i18n "search" }}" data-search-trigger>
          {{ partial "icons/search.html" . }}
        </button>

        <button class="icon-btn theme-toggle" type="button" aria-label="{{ i18n "toggle_theme" }}" data-theme-toggle>
          {{ partial "icons/sun.html" . }}
          {{ partial "icons/moon.html" . }}
        </button>

        {{ if site.Menus.main }}
          <button class="icon-btn site-nav__menu-btn" type="button"
                  aria-label="{{ i18n "open_menu" }}"
                  aria-controls="site-nav-list"
                  aria-expanded="false"
                  data-label-open="{{ i18n "open_menu" }}"
                  data-label-close="{{ i18n "close_menu" }}"
                  data-mobile-menu-toggle>
            {{ partial "icons/menu.html" . }}
          </button>
        {{ end }}
      </div>
    </nav>
  </div>
</header>
