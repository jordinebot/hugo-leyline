baseURL = "https://example.org/"
defaultContentLanguage = "en"
title = "Leyline — Demo"

# Point themesDir at the parent of this repo so each entry in `theme`
# resolves to a sibling directory. Keeps the exampleSite portable: works
# in any clone with no absolute paths and no extra CLI flags.
themesDir = "../.."
theme = ["hugo-leyline", "hugo-mtg-shortcodes"]

# Settings shared across all languages.
[params]
  accentColor = "#4f46e5"
  # logo = "/logo.svg"          # uncomment to use an image instead of the title

  [params.home]
    postCount = 6           # Featured posts (cards). Falls back to latest if none flagged.
    latestCount = 10        # Latest posts list shown below Featured (excludes posts already in Featured).

[taxonomies]
  tag = "tags"

# Footer links live PER LANGUAGE (see [[languages.<lang>.menus.footer]]
# blocks below). When `[languages]` is configured, top-level
# `[[menus.footer]]` blocks don't attach to any language and silently
# fail to render. Each entry can opt into an icon via `params.icon`.
# Built-in icons: github, mastodon, bluesky, x, twitter, linkedin, rss, mail.
# Add more by dropping an SVG at layouts/partials/icons/<name>.html.

# ---------------------------------------------------------------------------
# Languages
#
# Multilingual content uses file suffixes: `welcome-to-leyline.md` is the
# default-language version; `welcome-to-leyline.es.md` is the Spanish
# translation of the same post. Hugo links them via `.Translations`.
#
# Each language can override the global title, descriptions, menus, and
# params. Anything not overridden falls back to the top-level config.
# ---------------------------------------------------------------------------

[languages]

  [languages.en]
    label = "English"
    locale = "en-us"
    weight = 1

    [languages.en.params]
      description = "A clean, modern Hugo theme."
      [languages.en.params.footer]
        tagline = "Built with Leyline."

    [[languages.en.menus.main]]
      name = "Posts"
      url  = "/posts/"
      weight = 10
    [[languages.en.menus.main]]
      name = "Tags"
      url  = "/tags/"
      weight = 20
    [[languages.en.menus.main]]
      name = "About"
      url  = "/about/"
      weight = 30

    [[languages.en.menus.footer]]
      name = "GitHub"
      url  = "https://github.com/jordinebot/hugo-leyline"
      weight = 10
      [languages.en.menus.footer.params]
        icon = "github"
    [[languages.en.menus.footer]]
      name = "Mastodon"
      url  = "https://fosstodon.org/@example"
      weight = 20
      [languages.en.menus.footer.params]
        icon = "mastodon"
    [[languages.en.menus.footer]]
      name = "Bluesky"
      url  = "https://bsky.app/profile/example.bsky.social"
      weight = 30
      [languages.en.menus.footer.params]
        icon = "bluesky"
    [[languages.en.menus.footer]]
      name = "RSS"
      url  = "/index.xml"
      weight = 40
      [languages.en.menus.footer.params]
        icon = "rss"

  [languages.es]
    label = "Español"
    locale = "es-es"
    weight = 2
    title = "Leyline — Demo (Español)"

    [languages.es.params]
      description = "Un tema Hugo limpio y moderno."
      [languages.es.params.footer]
        tagline = "Hecho con Leyline."

    [[languages.es.menus.main]]
      name = "Entradas"
      url  = "/es/posts/"
      weight = 10
    [[languages.es.menus.main]]
      name = "Etiquetas"
      url  = "/es/tags/"
      weight = 20
    [[languages.es.menus.main]]
      name = "Acerca de"
      url  = "/es/about/"
      weight = 30

    [[languages.es.menus.footer]]
      name = "GitHub"
      url  = "https://github.com/jordinebot/hugo-leyline"
      weight = 10
      [languages.es.menus.footer.params]
        icon = "github"
    [[languages.es.menus.footer]]
      name = "Mastodon"
      url  = "https://fosstodon.org/@example"
      weight = 20
      [languages.es.menus.footer.params]
        icon = "mastodon"
    [[languages.es.menus.footer]]
      name = "Bluesky"
      url  = "https://bsky.app/profile/example.bsky.social"
      weight = 30
      [languages.es.menus.footer.params]
        icon = "bluesky"
    [[languages.es.menus.footer]]
      name = "RSS"
      url  = "/es/index.xml"
      weight = 40
      [languages.es.menus.footer.params]
        icon = "rss"

  [languages.ca]
    label = "Català"
    locale = "ca-es"
    weight = 3
    title = "Leyline — Demo (Català)"

    [languages.ca.params]
      description = "Un tema Hugo net i modern."
      [languages.ca.params.footer]
        tagline = "Fet amb Leyline."

    [[languages.ca.menus.main]]
      name = "Entrades"
      url  = "/ca/posts/"
      weight = 10
    [[languages.ca.menus.main]]
      name = "Etiquetes"
      url  = "/ca/tags/"
      weight = 20
    [[languages.ca.menus.main]]
      name = "Quant a"
      url  = "/ca/about/"
      weight = 30

    [[languages.ca.menus.footer]]
      name = "GitHub"
      url  = "https://github.com/jordinebot/hugo-leyline"
      weight = 10
      [languages.ca.menus.footer.params]
        icon = "github"
    [[languages.ca.menus.footer]]
      name = "Mastodon"
      url  = "https://fosstodon.org/@example"
      weight = 20
      [languages.ca.menus.footer.params]
        icon = "mastodon"
    [[languages.ca.menus.footer]]
      name = "Bluesky"
      url  = "https://bsky.app/profile/example.bsky.social"
      weight = 30
      [languages.ca.menus.footer.params]
        icon = "bluesky"
    [[languages.ca.menus.footer]]
